<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Best People Factory Batch 1</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C; --gold-light: #F0D080;
    --dark: #0D0D0D; --dark2: #181818; --dark3: #222222;
    --text: #F5F0E8; --muted: #888; --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--dark); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 2rem 1rem; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,76,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(201,168,76,0.06) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  #main { position: relative; z-index: 1; width: 100%; max-width: 560px; display: flex; flex-direction: column; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header-label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .header h1 { font-family: 'Bebas Neue', cursive; font-size: clamp(34px, 6vw, 52px); letter-spacing: 0.05em; line-height: 1; }
  .gold-line { width: 60px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 10px auto 0; }
  .p-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.6rem; }
  .p-card { background: var(--dark2); border: 0.5px solid #333; border-radius: var(--radius); padding: 16px 12px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .p-avatar { width: 88px; height: 88px; border-radius: 50%; overflow: hidden; border: 2.5px solid var(--gold); }
  .p-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .p-name { font-size: 13px; font-weight: 600; text-align: center; line-height: 1.3; }
  .btn-primary { width: 100%; padding: 14px; font-family: 'Bebas Neue', cursive; font-size: 20px; letter-spacing: 0.15em; background: var(--gold); color: var(--dark); border: none; border-radius: var(--radius); cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }
  #fs-overlay { display: none; position: fixed; inset: 0; z-index: 9999; background: var(--dark); flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
  #fs-overlay::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,76,0.15) 0%, transparent 70%), radial-gradient(ellipse 60% 40% at 80% 110%, rgba(201,168,76,0.08) 0%, transparent 60%); pointer-events: none; }
  .fs-exit-btn { position: absolute; top: 20px; right: 24px; background: transparent; color: var(--muted); border: 0.5px solid #444; border-radius: 8px; padding: 6px 14px; font-size: 12px; font-family: inherit; cursor: pointer; z-index: 10; }
  .fs-exit-btn:hover { color: var(--text); border-color: #666; }
  #lottery-inner { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 700px; padding: 0 2rem; position: relative; z-index: 1; }
  .fs-title-label { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.5rem; }
  .progress-wrap { width: 100%; max-width: 420px; margin-bottom: 10px; background: var(--dark3); border-radius: 99px; height: 4px; overflow: hidden; }
  .progress-bar { height: 4px; border-radius: 99px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); transition: width 0.4s linear; width: 100%; }
  .countdown-text { font-size: 13px; color: var(--muted); margin-bottom: 3rem; letter-spacing: 0.05em; }
  .spin-frame { position: relative; width: 280px; height: 280px; margin-bottom: 2rem; }
  .spin-ring { position: absolute; inset: -10px; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--gold); border-right-color: var(--gold-light); animation: spin-ring 1s linear infinite; }
  @keyframes spin-ring { to { transform: rotate(360deg); } }
  .spin-img { width: 280px; height: 280px; border-radius: 50%; object-fit: cover; border: 4px solid #333; display: block; transition: opacity 0.08s; }
  .spin-img.flash { opacity: 0; }
  .spin-name-display { font-family: 'Bebas Neue', cursive; font-size: clamp(48px, 8vw, 80px); letter-spacing: 0.06em; color: var(--text); text-align: center; min-height: 80px; transition: opacity 0.06s; }
  .spin-name-display.flash { opacity: 0; }
  #winner-inner { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 700px; padding: 0 2rem; position: relative; z-index: 1; }
  .winner-label { font-size: 12px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; }
  .winner-frame { position: relative; margin-bottom: 2rem; }
  .winner-glow { position: absolute; inset: -30px; border-radius: 50%; background: radial-gradient(circle, rgba(201,168,76,0.3) 0%, transparent 70%); animation: pulseGlow 2s ease-in-out infinite; }
  @keyframes pulseGlow { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.08)} }
  .winner-photo { width: 260px; height: 260px; border-radius: 50%; object-fit: cover; border: 4px solid var(--gold); position: relative; z-index: 1; animation: popIn 0.7s cubic-bezier(0.175,0.885,0.32,1.275) both; }
  @keyframes popIn { from{transform:scale(0.2) rotate(-10deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
  .winner-name { font-family: 'Bebas Neue', cursive; font-size: clamp(56px,10vw,96px); letter-spacing: 0.06em; background: linear-gradient(135deg, var(--gold-light), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-align: center; animation: slideUp 0.5s 0.4s both; margin-bottom: 10px; }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  .stars-row { font-size: 26px; letter-spacing: 8px; animation: slideUp 0.5s 0.6s both; margin-bottom: 2.5rem; }
  .btn-reset { padding: 10px 32px; font-size: 13px; background: transparent; color: var(--muted); border: 0.5px solid #333; border-radius: 8px; cursor: pointer; font-family: inherit; transition: color 0.2s, border-color 0.2s; animation: slideUp 0.5s 0.8s both; }
  .btn-reset:hover { color: var(--text); border-color: #666; }
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 99999; overflow: hidden; }
  .particle { position: absolute; animation: fall linear forwards; }
  @keyframes fall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
</style>
</head>

let spinTO = null, timerIV = null;

function startLottery() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();

  document.getElementById('main').style.display = 'none';
  document.getElementById('fs-overlay').style.display = 'flex';
  document.getElementById('lottery-inner').style.display = 'flex';
  document.getElementById('winner-inner').style.display = 'none';

  spinEl.currentTime = 0;
  spinEl.play().catch(() => {});

  const startTime = Date.now();
  const sImg = document.getElementById('spin-img');
  const sNm  = document.getElementById('spin-name');

  function delay(e, t) {
    const p = e/t;
    if (p<0.55) return 90; if (p<0.75) return 200;
    if (p<0.88) return 400; if (p<0.95) return 700; return 1100;
  }
  let idx = 0;
  function tick() {
    const elapsed = Date.now() - startTime;
    if (elapsed >= DURATION_MS) { showWinner(participants[WINNER_IDX]); return; }
    sImg.classList.add('flash'); sNm.classList.add('flash');
    setTimeout(() => {
      const p = participants[idx % participants.length]; idx++;
      sImg.src = p.dataUrl; sNm.textContent = p.name;
      sImg.classList.remove('flash'); sNm.classList.remove('flash');
    }, 50);
    spinTO = setTimeout(tick, delay(elapsed, DURATION_MS));
  }
  tick();

  timerIV = setInterval(() => {
    const elapsed = Date.now() - startTime;
    document.getElementById('prog-bar').style.width = Math.max(0, 100-(elapsed/DURATION_MS*100))+'%';
    const rem = Math.max(0, Math.ceil((DURATION_MS-elapsed)/1000));
    document.getElementById('countdown').textContent = 'Waiting... ' + rem + 's';
    if (elapsed >= DURATION_MS) clearInterval(timerIV);
  }, 250);
}

function showWinner(w) {
  clearTimeout(spinTO); clearInterval(timerIV);
  spinEl.pause(); spinEl.currentTime = 0;
  winnerEl.currentTime = 0; winnerEl.play().catch(() => {});
  document.getElementById('lottery-inner').style.display = 'none';
  document.getElementById('winner-inner').style.display = 'flex';
  document.getElementById('w-photo').src = w.dataUrl;
  document.getElementById('w-name').textContent = w.name;
  const colors = ['#C9A84C','#F0D080','#ffffff','#C94C9A','#4C9AC9'];
  const pc = document.getElementById('particles'); pc.innerHTML = '';
  for (let i=0; i<80; i++) {
    const d = document.createElement('div'); d.className='particle';
    d.style.cssText=`left:${Math.random()*100}%;background:${colors[~~(Math.random()*colors.length)]};width:${4+Math.random()*7}px;height:${4+Math.random()*7}px;border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*1.5}s;`;
    pc.appendChild(d);
  }
  setTimeout(() => pc.innerHTML='', 6000);
}

function exitOverlay() {
  clearTimeout(spinTO); clearInterval(timerIV);
  spinEl.pause(); spinEl.currentTime = 0;
  winnerEl.pause(); winnerEl.currentTime = 0;
  if (document.exitFullscreen) document.exitFullscreen();
  else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  document.getElementById('fs-overlay').style.display = 'none';
  document.getElementById('main').style.display = 'flex';
}

function resetAll() {
  clearTimeout(spinTO); clearInterval(timerIV);
  spinEl.pause(); spinEl.currentTime = 0;
  winnerEl.pause(); winnerEl.currentTime = 0;
  if (document.exitFullscreen) document.exitFullscreen();
  else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  document.getElementById('fs-overlay').style.display = 'none';
  document.getElementById('main').style.display = 'flex';
}

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    spinEl.pause(); winnerEl.pause();
    document.getElementById('fs-overlay').style.display = 'none';
    document.getElementById('main').style.display = 'flex';
  }
});
</script>
</body>
</html>
